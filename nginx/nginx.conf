events {
    worker_connections 4096;
}

http {
    # Rate-limit subscription fetches per IP: 10 req/min, burst 5
    limit_req_zone $binary_remote_addr zone=sub_zone:10m rate=10r/m;

    upstream subscription_svc {
        server subscription:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Public subscription endpoint
        location /sub/ {
            limit_req zone=sub_zone burst=5 nodelay;
            proxy_pass         http://subscription_svc;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Internal health check
        location = /health {
            proxy_pass http://subscription_svc;
            access_log off;
        }

        # Block everything else — /admin/ stays internal-only
        location / {
            return 444;
        }
    }
}
