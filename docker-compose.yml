version: '3.8'

services:
  3xui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3xui
    hostname: 3xui
    volumes:
      - ./3xui/db:/etc/x-ui
      - ./3xui/cert:/root/cert
    ports:
      - "127.0.0.1:10443:443"   # VLESS Reality (nginx routes here via SNI)
      - "127.0.0.1:2053:2053"   # Panel (nginx routes here at panel.*)
    restart: unless-stopped
    networks:
      - vpn-net

  subscription:
    build: ./subscription
    container_name: subscription
    volumes:
      - ./subscription/data:/app/data
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"   # Subscription API (nginx routes here at sub.*)
    depends_on:
      - 3xui
    restart: unless-stopped
    networks:
      - vpn-net

networks:
  vpn-net:
    driver: bridge
