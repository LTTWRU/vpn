version: '3.8'

services:
  3xui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3xui
    hostname: 3xui
    volumes:
      - ./3xui/db:/etc/x-ui
      - ./3xui/cert:/root/cert
    ports:
      - "443:443"
      - "127.0.0.1:2053:2053"
    restart: unless-stopped
    networks:
      - vpn-net

  subscription:
    build: ./subscription
    container_name: subscription
    volumes:
      - ./subscription/data:/app/data
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - 3xui
    restart: unless-stopped
    networks:
      - vpn-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - subscription
    restart: unless-stopped
    networks:
      - vpn-net

networks:
  vpn-net:
    driver: bridge
